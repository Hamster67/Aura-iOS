name: Build Unsigned IPA for Sideloadly

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      run: sudo xcode-select -switch /Applications/Xcode.app
    
    - name: Build Metal Shader
      run: |
        mkdir -p build
        xcrun metal -c Aura/Shaders/RippleShader.metal -o build/RippleShader.air
        xcrun metallib build/RippleShader.air -o build/default.metallib
    
    - name: Build Unsigned .app
      run: |
        xcodebuild -project Aura.xcodeproj \
          -scheme Aura \
          -configuration Release \
          -derivedDataPath build/derived \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          ONLY_ACTIVE_ARCH=NO \
          build
    
    - name: Create Payload Folder
      run: |
        mkdir -p build/Payload
        cp -R build/derived/Build/Products/Release-iphoneos/Aura.app build/Payload/
    
    - name: Zip to IPA
      run: |
        cd build
        zip -r Aura.ipa Payload/
        cd ..
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aura-Unsigned
        path: build/Aura.ipa