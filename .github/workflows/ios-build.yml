name: Aura iOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: macos-14
    env:
      PROJECT: Aura.xcodeproj
      SCHEME: Aura
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select --switch /Applications/Xcode_15.4.app

      - name: Build Aura App
        run: >-
          xcodebuild clean build -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' 
          -derivedDataPath "$DERIVED_DATA_PATH" 
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS=""

      - name: Package for Sideloadly
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release-iphoneos/Aura.app"
          mkdir -p build/sideload/Payload
          cp -R "$APP_PATH" build/sideload/Payload/
          cd build/sideload
          zip -qry ../Aura-Sideload.ipa Payload

      - name: Publish Sideload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Sideload-Artifact
          path: build/Aura-Sideload.ipa
          retention-days: 14