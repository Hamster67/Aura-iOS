name: Aura iOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      PROJECT: Aura.xcodeproj
      SCHEME: Aura
      ARCHIVE_PATH: ${{ github.workspace }}/build/Aura.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
      TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      HAS_SIGNING: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select --switch /Applications/Xcode_15.4.app

      - name: Inject App Icon Into Project Assets
        run: |
          # 1. 定義你目前存放圖片的特殊路徑，以及專案內真正的 Assets 標準路徑
          SOURCE_ICON="${{ github.workspace }}/Aura-iOS/Aura.xcodeproj/AppIcon.appiconset/AppIcon.png"
          TARGET_ASSETS_DIR="${{ github.workspace }}/Aura-iOS/Aura/Assets.xcassets/AppIcon.appiconset"
          
          # 如果專案根目錄沒有 Aura-iOS 前綴，嘗試修正路徑
          if [ ! -f "$SOURCE_ICON" ] && [ -d "Aura.xcodeproj" ]; then
            SOURCE_ICON="${{ github.workspace }}/Aura.xcodeproj/AppIcon.appiconset/AppIcon.png"
            TARGET_ASSETS_DIR="${{ github.workspace }}/Aura/Assets.xcassets/AppIcon.appiconset"
          fi
          
          echo "正在建立標準資產目錄: $TARGET_ASSETS_DIR"
          mkdir -p "$TARGET_ASSETS_DIR"
          
          # 2. 複製並使用 sips 強制生成所有 iOS 設備標準規格圖檔
          if [ -f "$SOURCE_ICON" ]; then
            echo "✅ 成功讀取 .xcodeproj 內部的 AppIcon.png"
            cp "$SOURCE_ICON" "$TARGET_ASSETS_DIR/icon_1024.png"
          else
            echo "⚠️ 未能找到 $SOURCE_ICON，改用網路預設圖佔位..."
            curl -sS "https://picsum.photos/1024" -o "$TARGET_ASSETS_DIR/icon_1024.png"
          fi
          
          sips -z 40 40   "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_20x20_2x.png"
          sips -z 60 60   "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_20x20_3x.png"
          sips -z 58 58   "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_29x29_2x.png"
          sips -z 87 87   "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_29x29_3x.png"
          sips -z 80 80   "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_40x40_2x.png"
          sips -z 120 120 "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_40x40_3x.png"
          sips -z 120 120 "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_60x60_2x.png"
          sips -z 180 180 "$TARGET_ASSETS_DIR/icon_1024.png" --out "$TARGET_ASSETS_DIR/icon_60x60_3x.png"
          
          # 3. 寫入 Xcode 編譯必備的資產配置表 (Contents.json)
          cat << 'EOF' > "$TARGET_ASSETS_DIR/Contents.json"
          {
            "images" : [
              { "size" : "20x20", "idiom" : "iphone", "filename" : "icon_20x20_2x.png", "scale" : "2x" },
              { "size" : "20x20", "idiom" : "iphone", "filename" : "icon_20x20_3x.png", "scale" : "3x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "icon_29x29_2x.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "icon_29x29_3x.png", "scale" : "3x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "icon_40x40_2x.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "icon_40x40_3x.png", "scale" : "3x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "icon_60x60_2x.png", "scale" : "2x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "icon_60x60_3x.png", "scale" : "3x" },
              { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "icon_1024.png", "scale" : "1x" }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          EOF

      - name: Verify unsigned Release build
        run: >-
          xcodebuild clean build -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' -derivedDataPath "$DERIVED_DATA_PATH" 
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS=""
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon

      - name: Package unsigned IPA
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release-iphoneos/Aura.app"
          test -d "$APP_PATH"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")
          test -f "$APP_PATH/$EXECUTABLE_NAME"
          mkdir -p build/unsigned/Payload
          cp -R "$APP_PATH" build/unsigned/Payload/Aura.app
          (cd build/unsigned && zip -qry ../../Aura-unsigned.ipa Payload)

      - name: Install distribution certificate and provisioning profile
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        env:
          CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/aura-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/aura.mobileprovision"
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Archive signed app
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: >-
          xcodebuild clean archive -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -archivePath "$ARCHIVE_PATH" -derivedDataPath "$DERIVED_DATA_PATH" DEVELOPMENT_TEAM="$TEAM_ID"
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon

      - name: Export IPA
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: >-
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH"
          -exportOptionsPlist exportOptions.plist -exportPath "$EXPORT_PATH"

      - name: Prepare Signed IPA For Release
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: |
          if [ -d "$EXPORT_PATH" ]; then
            cp "$EXPORT_PATH"/*.ipa ./Aura-signed.ipa
          fi

      - name: Publish build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Aura-${{ github.run_number }}
          path: |
            build
            *.ipa
          if-no-files-found: warn
          retention-days: 14

      - name: Create GitHub Release and Upload IPAs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.ipa"
          tag: "v1.0.${{ github.run_number }}"
          name: "Aura Core Build v1.0.${{ github.run_number }}"
          body: |
            Aura 自動編譯完成。
            
            - 已強制修正並注入專案原生 AppIcon 資源進行打包
            - 包含完整的圖示搜尋與 SoundManager 更新
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}