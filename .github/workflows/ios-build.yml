name: Aura iOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: macos-14
    env:
      PROJECT: Aura.xcodeproj
      SCHEME: Aura
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select --switch /Applications/Xcode_15.4.app

      - name: Generate Beautiful Aura App Icon (All Sizes & Sync Contents.json)
        run: |
          cat << 'EOF' > generate_icon.swift
          import SwiftUI
          import Cocoa

          struct AuraAppIconView: View {
              var body: some View {
                  ZStack {
                      Color(red: 0.05, green: 0.06, blue: 0.12)
                      
                      Circle()
                          .fill(RadialGradient(
                              colors: [.init(red: 0.0, green: 0.8, blue: 1.0).opacity(0.6), .clear],
                              center: .center, startRadius: 50, endRadius: 850
                          ))
                          .offset(x: -120, y: -120)
                      
                      Circle()
                          .fill(RadialGradient(
                              colors: [.init(red: 0.9, green: 0.3, blue: 0.9).opacity(0.5), .clear],
                              center: .center, startRadius: 50, endRadius: 800
                          ))
                          .offset(x: 150, y: 180)

                      // 玻璃水珠
                      ZStack {
                          Circle()
                              .fill(.white.opacity(0.07))
                              .background(
                                  Circle()
                                      .fill(LinearGradient(
                                          colors: [.white.opacity(0.25), .clear, .init(red: 0.0, green: 0.8, blue: 1.0).opacity(0.25)],
                                          startPoint: .topLeading, endPoint: .bottomTrailing
                                      ))
                              )
                          
                          Circle()
                              .stroke(
                                  LinearGradient(
                                      colors: [.white.opacity(0.65), .white.opacity(0.1), .init(red: 0.0, green: 0.8, blue: 1.0).opacity(0.4)],
                                      startPoint: .topLeading, endPoint: .bottomTrailing
                                  ),
                                  lineWidth: 8
                              )
                          
                          Ellipse()
                              .fill(.white.opacity(0.6))
                              .frame(width: 160, height: 90)
                              .rotationEffect(.degrees(-30))
                              .offset(x: -120, y: -150)
                              .blur(radius: 2)
                          
                          Circle()
                              .fill(Color(red: 0.8, green: 0.3, blue: 0.9).opacity(0.45))
                              .frame(width: 220, height: 220)
                              .offset(x: 90, y: 120)
                              .blur(radius: 40)
                      }
                      .frame(width: 600, height: 600)
                      .shadow(color: .black.opacity(0.6), radius: 60, x: 0, y: 40)
                  }
                  .frame(width: 1024, height: 1024)
              }
          }

          // 輔助將 SwiftUI 視圖渲染成指定大小並存檔的方法
          func saveIcon(view: AuraAppIconView, size: CGFloat, to url: URL) {
              let hostingView = NSHostingView(rootView: view)
              hostingView.frame = NSRect(x: 0, y: 0, width: size, height: size)
              let bitmapRep = hostingView.bitmapImageRepForCachingDisplay(in: hostingView.bounds)!
              hostingView.cacheDisplay(in: hostingView.bounds, to: bitmapRep)
              if let pngData = bitmapRep.representation(using: .png, properties: [:]) {
                  try? pngData.write(to: url)
              }
          }

          let fm = FileManager.default
          let currentDirectory = fm.currentDirectoryPath

          // 核心修正：強制搜尋所有可能的 AppIcon 資料夾（確保覆蓋到 Flutter 根目錄中的原始檔案）
          guard let enumerator = fm.enumerator(at: URL(fileURLWithPath: currentDirectory), includingPropertiesForKeys: nil, options: [.skipsHiddenFiles], errorHandler: nil) else { exit(1) }

          var targets: [URL] = []
          for case let fileURL as URL in enumerator {
              if fileURL.lastPathComponent == "AppIcon.appiconset" {
                  targets.append(fileURL)
              }
          }

          if targets.isEmpty {
              print("❌ 找不到任何 AppIcon.appiconset 資料夾")
              exit(1)
          }

          let iconView = AuraAppIconView()

          // 對找到的每一個 AppIcon 夾（不論是 Xcode 快取還是 Flutter 原始目錄）都清洗一次
          for assetFolder in targets {
              print("📥 正在全面重構圖示庫: \(assetFolder.path)")
              
              // 輸出所有 iOS 桌面必備尺寸
              saveIcon(view: iconView, size: 1024, to: assetFolder.appendingPathComponent("appstore.png"))
              saveIcon(view: iconView, size: 180, to: assetFolder.appendingPathComponent("iphone-60@3x.png"))
              saveIcon(view: iconView, size: 120, to: assetFolder.appendingPathComponent("iphone-60@2x.png"))
              saveIcon(view: iconView, size: 87, to: assetFolder.appendingPathComponent("iphone-29@3x.png"))
              saveIcon(view: iconView, size: 58, to: assetFolder.appendingPathComponent("iphone-29@2x.png"))
              saveIcon(view: iconView, size: 80, to: assetFolder.appendingPathComponent("iphone-40@2x.png"))
              saveIcon(view: iconView, size: 120, to: assetFolder.appendingPathComponent("iphone-40@3x.png"))

              // 同步寫入強制的 Contents.json 配置檔，綁定上述生成的新圖片
              let jsonContent = """
              {
                "images" : [
                  { "size" : "29x29", "idiom" : "iphone", "filename" : "iphone-29@2x.png", "scale" : "2x" },
                  { "size" : "29x29", "idiom" : "iphone", "filename" : "iphone-29@3x.png", "scale" : "3x" },
                  { "size" : "40x40", "idiom" : "iphone", "filename" : "iphone-40@2x.png", "scale" : "2x" },
                  { "size" : "40x40", "idiom" : "iphone", "filename" : "iphone-40@3x.png", "scale" : "3x" },
                  { "size" : "60x60", "idiom" : "iphone", "filename" : "iphone-60@2x.png", "scale" : "2x" },
                  { "size" : "60x60", "idiom" : "iphone", "filename" : "iphone-60@3x.png", "scale" : "3x" },
                  { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "appstore.png", "scale" : "1x" }
                ],
                "info" : { "version" : 1, "author" : "xcode" }
              }
              """
              
              let jsonURL = assetFolder.appendingPathComponent("Contents.json")
              try? jsonContent.write(to: jsonURL, encoding: .utf8)
              print("✅ 成功複寫並綁定該目錄下的 Contents.json")
          }
          EOF
          
          xcrun swift generate_icon.swift

      - name: Build Aura App
        run: >-
          xcodebuild clean build -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' 
          -derivedDataPath "$DERIVED_DATA_PATH" 
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS=""

      - name: Package for Sideloadly
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release-iphoneos/Aura.app"
          mkdir -p build/sideload/Payload
          cp -R "$APP_PATH" build/sideload/Payload/
          cd build/sideload
          zip -qry ../Aura-Sideload.ipa Payload

      - name: Publish Sideload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Sideload-Artifact
          path: build/Aura-Sideload.ipa
          retention-days: 14