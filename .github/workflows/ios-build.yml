name: Aura iOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      PROJECT: Aura.xcodeproj
      SCHEME: Aura
      ARCHIVE_PATH: ${{ github.workspace }}/build/Aura.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
      TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      HAS_SIGNING: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select --switch /Applications/Xcode_15.4.app

      # 核心修正：將你現有的 AppIcon.png 與目錄移動到正確的資產庫位置，並註冊至專案檔
      - name: Link Existing App Icon to Project
        run: |
          # 1. 建立標準的 Assets.xcassets 結構
          mkdir -p Aura/Assets.xcassets/AppIcon.appiconset
          
          # 2. 複製你原本存放在專案目錄下的 AppIcon.png 過去，並重新命名為 icon.png 符合配置
          if [ -f "Aura-iOS/Aura.xcodeproj/AppIcon.appiconset/AppIcon.png" ]; then
            cp "Aura-iOS/Aura.xcodeproj/AppIcon.appiconset/AppIcon.png" Aura/Assets.xcassets/AppIcon.appiconset/icon.png
          elif [ -f "Aura/Aura.xcodeproj/AppIcon.appiconset/AppIcon.png" ]; then
            cp "Aura/Aura.xcodeproj/AppIcon.appiconset/AppIcon.png" Aura/Assets.xcassets/AppIcon.appiconset/icon.png
          fi
          
          # 3. 寫入單一尺寸 (Single Size) 配置文件
          cat << 'EOF' > Aura/Assets.xcassets/AppIcon.appiconset/Contents.json
          {
            "images" : [
              {
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024",
                "filename" : "icon.png"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF
          
          # 4. 透過 Ruby 腳本將 Assets.xcassets 強行綁定至 Xcode 專案 target 中
          gem install xcodeproj --no-document
          ruby -r xcodeproj -e '
            project_path = "Aura.xcodeproj"
            unless File.exist?(project_path)
              project_path = "Aura-iOS/Aura.xcodeproj"
            end
            
            project = Xcodeproj::Project.open(project_path)
            main_group = project.main_group["Aura"] || project.main_group
            
            file_ref = main_group.files.find { |f| f.path == "Assets.xcassets" }
            unless file_ref
              file_ref = main_group.new_file("Assets.xcassets")
              project.targets.each do |target|
                if target.name == "Aura"
                  target.resources_build_phase.add_file_reference(file_ref)
                  target.build_configurations.each do |config|
                    config.build_settings["ASSETCATALOG_COMPILER_APPICON_NAME"] = "AppIcon"
                  end
                end
              end
              project.save
              puts "成功將現有 AppIcon 註冊至專案結構！"
            else
              puts "Assets.xcassets 節點已存在。"
            end
          '

      - name: Verify unsigned Release build
        run: >-
          xcodebuild clean build -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' -derivedDataPath "$DERIVED_DATA_PATH" CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS=""
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon

      - name: Package unsigned IPA
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release-iphoneos/Aura.app"
          test -d "$APP_PATH"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")
          test -f "$APP_PATH/$EXECUTABLE_NAME"
          mkdir -p build/unsigned/Payload
          cp -R "$APP_PATH" build/unsigned/Payload/Aura.app
          (cd build/unsigned && zip -qry ../../Aura-unsigned.ipa Payload)

      - name: Install distribution certificate and provisioning profile
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        env:
          CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/aura-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/aura.mobileprovision"
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Archive signed app
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: >-
          xcodebuild clean archive -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -archivePath "$ARCHIVE_PATH" -derivedDataPath "$DERIVED_DATA_PATH" DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export IPA
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: >-
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH"
          -exportOptionsPlist exportOptions.plist -exportPath "$EXPORT_PATH"

      - name: Prepare Signed IPA For Release
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: |
          if [ -d "$EXPORT_PATH" ]; then
            cp "$EXPORT_PATH"/*.ipa ./Aura-signed.ipa
          fi

      - name: Publish build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Aura-${{ github.run_number }}
          path: |
            build
            *.ipa
          if-no-files-found: warn
          retention-days: 14

      - name: Create GitHub Release and Upload IPAs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.ipa"
          tag: "v1.0.${{ github.run_number }}"
          name: "Aura Core Build v1.0.${{ github.run_number }}"
          body: |
            Aura 自動編譯意圖核心。
            
            - 已整合專案原生 AppIcon 資源進行打包
            - 包含完整的圖示搜尋與 SoundManager 更新
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}