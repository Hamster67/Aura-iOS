name: Aura iOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      PROJECT: Aura.xcodeproj
      SCHEME: Aura
      ARCHIVE_PATH: ${{ github.workspace }}/build/Aura.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      DERIVED_DATA_PATH: ${{ github.workspace }}/build/DerivedData
      TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      HAS_SIGNING: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select --switch /Applications/Xcode_15.4.app

      - name: Verify and Debug Build
        run: |
          # 1. 強制列出所有 .xcodeproj 檔案以確認正確路徑
          echo "正在搜尋專案檔位置..."
          find . -name "*.xcodeproj"
          
          # 2. 根據找到的路徑修正執行指令
          # 假設 find 輸出結果為 ./Aura.xcodeproj，則將專案路徑改為 "Aura.xcodeproj"
          # 如果輸出為 ./Aura-iOS/Aura.xcodeproj，則保持原本路徑
          
          echo "開始編譯..."
          # 這裡請嘗試使用 ./Aura.xcodeproj 或你從上方 find 指令看到的正確路徑
          xcodebuild build -project "Aura.xcodeproj" -scheme "Aura" -configuration Release \
          -sdk iphoneos -destination 'generic/platform=iOS' \
          -derivedDataPath "$(pwd)/build/DerivedData" \
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon

      - name: Force Inject App Icon to App Bundle
        run: |
          # 編譯完成後再尋找檔案
          APP_PATH=$(find "$(pwd)/build/DerivedData" -name "Aura.app" -type d | head -n 1)
          ICON_PATH=$(find . -name "AppIcon.png" | grep "AppIcon.appiconset" | head -n 1)
          
          if [ -d "$APP_PATH" ] && [ -f "$ICON_PATH" ]; then
            cp "$ICON_PATH" "$APP_PATH/Icon.png"
            # 注入邏輯...[cite: 2]
          else
            echo "❌ 找不到檔案，請確認編譯是否成功。"
            exit 1
          fi

      - name: Package unsigned IPA
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release-iphoneos/Aura.app"
          test -d "$APP_PATH"
          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")
          test -f "$APP_PATH/$EXECUTABLE_NAME"
          mkdir -p build/unsigned/Payload
          cp -R "$APP_PATH" build/unsigned/Payload/Aura.app
          (cd build/unsigned && zip -qry ../../Aura-unsigned.ipa Payload)

      - name: Install distribution certificate and provisioning profile
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        env:
          CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/aura-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/aura.mobileprovision"
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Archive signed app
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: >-
          xcodebuild clean archive -project "$PROJECT" -scheme "$SCHEME"
          -configuration Release -archivePath "$ARCHIVE_PATH" -derivedDataPath "$DERIVED_DATA_PATH" DEVELOPMENT_TEAM="$TEAM_ID"
          ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon

      - name: Export IPA
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: >-
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH"
          -exportOptionsPlist exportOptions.plist -exportPath "$EXPORT_PATH"

      - name: Prepare Signed IPA For Release
        if: env.HAS_SIGNING == 'true' && github.event_name != 'pull_request'
        run: |
          if [ -d "$EXPORT_PATH" ]; then
            cp "$EXPORT_PATH"/*.ipa ./Aura-signed.ipa
          fi

      - name: Publish build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Aura-${{ github.run_number }}
          path: |
            build
            *.ipa
          if-no-files-found: warn
          retention-days: 14

      - name: Create GitHub Release and Upload IPAs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.ipa"
          tag: "v1.0.${{ github.run_number }}"
          name: "Aura Core Build v1.0.${{ github.run_number }}"
          body: |
            Aura 自動編譯完成。
            
            - 已強制修正並注入專案原生 AppIcon 資源進行打包
            - 包含完整的圖示搜尋與 SoundManager 更新
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}